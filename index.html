  <meta charset="UTF-8" />

    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
<title>Play Free Online Chess - Multiplayer Chess Game</title>

<meta name="description"
content="Play free online chess with friends. Multiplayer chess game with room creation and real-time gameplay.">

<meta name="keywords"
content="online chess, multiplayer chess, free chess game, play chess online, chess">

<meta name="author"
content="Anji">

<meta name="robots"
content="index, follow">
  <link
  rel="icon"
  type="image/png"
  href="assets/favicon.png"
/><meta property="og:title"
content="Play Free Online Chess">

<meta property="og:description"
content="Play multiplayer chess online with friends in real time.">

<meta property="og:image"
content="https://chessgame.anjicmrcet.online/preview.png">

<meta property="og:url"
content="https://chessgame.anjicmrcet.online">

<meta property="og:type"
content="website">
  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

<div class="container">

  <!-- TITLE -->
  <h1>NEON CHESS</h1>

  <!-- TOP CONTROLS -->
  <div class="top-controls">

    <select id="gameMode">
      <option value="2player">
        2 Players
      </option>

      <option value="bot">
        Vs Bot
      </option>
    </select>

    <select id="difficulty">
      <option value="easy">
        Beginner
      </option>

      <option value="medium">
        Intermediate
      </option>

      <option value="hard">
        Hard
      </option>
    </select>

  </div>

  <!-- INFO -->
  <div class="info-row">

    <div class="info-box">
      White
    </div>

    <div
      class="turn-box"
      id="turnText"
    >
      White's Turn
    </div>

    <div class="info-box">
      Black
    </div>

  </div>

 <!-- GAME MESSAGE -->
<div
  id="gameMessage"
  class="game-message"
></div>

<div
  id="checkmateOverlay"
  class="checkmate-overlay"
>

  <div
    id="winnerMessage"
    class="winner-message"
  >
  </div>

</div>

<!-- BOARD -->
<div
  class="board"
  id="board"
></div>

  <!-- BUTTONS -->
  <div class="button-row">

    <button
      class="btn undo"
      id="undoBtn"
    >
      Undo
    </button>

    <button
      class="btn reset"
      id="resetBtn"
    >
      Reset
    </button>

  </div>

  <!-- ROOM -->
  <div class="room-box">

    <h3>Create Room</h3>

   <input
  type="text"
  placeholder="Room Code"
  maxlength="5"
  autocomplete="off"
>
    <div class="room-actions">

<button class="join-btn">
Join
</button>

<button
class="exit-btn"
id="exitRoom"
>
✕
</button>

</div>
<p id="networkStatus">
🔴 Offline
</p>

  </div>

</div>
<section class="seo-text">
  <p>
    Play free online multiplayer chess with friends.
    Create private rooms and play chess online in real time.
  </p>
</section>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
